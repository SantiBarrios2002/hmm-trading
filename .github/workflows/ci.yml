name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: |
          if [ -d src ] || [ -d tests ]; then
            ruff check .
          else
            echo "Skipping ruff: no src/ or tests/ directory yet."
          fi

      - name: Run Black check
        run: |
          if [ -d src ] || [ -d tests ]; then
            black --check .
          else
            echo "Skipping black: no src/ or tests/ directory yet."
          fi

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "Skipping pytest: no tests/ directory yet."
          fi
